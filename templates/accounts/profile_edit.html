{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="main-content profile-grid">
  <!-- Left: Profile card preview -->
  <div class="profile-card">
    <div class="avatar-container">
      {% if user.profile.avatar %}
        <img src="{{ user.profile.avatar.url }}" alt="avatar" class="avatar-placeholder">
      {% else %}
        <div class="avatar-placeholder"><span class="bi bi-person" style="font-size:3rem;"></span></div>
      {% endif %}
      <span class="avatar-upload"><span class="bi bi-camera"></span></span>
    </div>
    <div class="username">{{ user.username }}</div>
    <div class="user-bio">{{ user.profile.bio|default:"Bio yozilmagan" }}</div>
    <div class="profile-actions mt-2">
      <a href="{% url 'accounts:dashboard' %}" class="btn btn-gradient">Dashboard</a>
    </div>
  </div>

  <!-- Right: Edit form -->
  <div class="profile-form">
    <h2 class="form-title">Mening profilim</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}
      <button class="btn btn-gradient">Saqlash</button>
    </form>
  </div>
</div>
{% endblock %}
